<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome (Icon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入 Google Fonts (Noto Sans TC) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f4f6f8; /* 淺灰色背景 */
        }
        
        /* 自訂卡片內文字框的捲軸樣式 */
        .prompt-box::-webkit-scrollbar {
            width: 6px;
        }
        .prompt-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .prompt-box::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        .prompt-box::-webkit-scrollbar-thumb:hover {
            background-color: #94a3b8;
        }

        /* 隱藏預設捲軸，讓畫面更乾淨 (針對主畫面) */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen pb-12">

    <!-- 頂部 Header -->
    <header class="pt-12 pb-6 px-4 text-center">
        <h1 class="text-3xl font-bold mb-3 flex justify-center items-center gap-2">
            🚀 AI Prompt 智能寶庫
        </h1>
        <a href="https://docs.google.com/spreadsheets/d/12bQtFvexxt1yfl_08fWLzH80-6vZowaGTq7FtwM9GAg/edit" target="_blank" class="text-gray-500 hover:text-gray-700 text-sm inline-flex items-center gap-1 transition-colors">
            <i class="fa-solid fa-folder-open text-gray-400"></i> 開啟原始資料 Google Sheet
        </a>
    </header>

    <!-- 搜尋欄 -->
    <div class="max-w-2xl mx-auto px-4 mb-6">
        <div class="relative shadow-sm rounded-full bg-white">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
            </div>
            <input type="text" id="searchInput" class="block w-full pl-11 pr-4 py-3 rounded-full border-0 text-gray-900 ring-1 ring-inset ring-gray-200 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-blue-500 sm:text-sm sm:leading-6 outline-none transition-all" placeholder="搜尋提示詞...">
        </div>
    </div>

    <!-- 篩選標籤區 -->
    <div class="max-w-5xl mx-auto px-4 mb-10">
        <div id="filterContainer" class="flex flex-wrap justify-center gap-2">
            <!-- 標籤將由 JS 動態生成 -->
        </div>
    </div>

    <!-- 主要內容區 -->
    <main class="max-w-6xl mx-auto px-4">
        <!-- 區塊標題 -->
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-gray-700">
            🧠 AI 協思
        </h2>
        
        <!-- 載入中提示 -->
        <div id="loadingIndicator" class="text-center py-10 text-gray-500 hidden">
            <i class="fa-solid fa-circle-notch fa-spin text-2xl mb-2"></i>
            <p>正在從 Google Sheet 載入資料...</p>
        </div>

        <!-- 卡片網格 -->
        <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- 卡片將由 JS 動態生成 -->
        </div>
    </main>

    <script>
        // Google Sheet 的 ID
        const SHEET_ID = '12bQtFvexxt1yfl_08fWLzH80-6vZowaGTq7FtwM9GAg';
        // Google Visualization API 端點 (可輸出 JSON 格式)
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        // 預設資料 (若 Google Sheet 無法讀取時的備用資料，完全模擬截圖內容)
        const mockData = [
            { category: '內容創作', title: '意義單詞', prompt: '將文章的重點部分，尋找一個代表性英文字母，並使這些字母的首字組合成一個具有意義的單詞（如「VISION」）' },
            { category: '內容創作', title: '品牌名稱', prompt: '完成 ChatGPT 角色定義後，依據「品牌定義」與「產品介紹」發想5個產品名稱與標題（口號）。\n- 提示詞指令：描述品牌與產品，請列出 數字 個產品名稱與行銷標題建議。（*品牌定義*描述、*產品介紹*描述）\n- Prompt\n　　- 我推出一個運動鞋品牌，今年會銷售一款新型跑步鞋...' },
            { category: '筆記精煉', title: '長編文章', prompt: '為這一篇長篇文章，進行以下四個步驟，每一個步驟都提供給文章與標示出來\n第1、請為這篇長文件生成一份簡短摘要。\n第2、請基於上一個摘要，不要遺漏任何專有名詞、數字或關鍵人物，重新生成一份摘要。\n第3、現在，請將摘要中每一句話都濃縮成更簡潔的表達，同時保留原意...' },
            { category: '筆記精煉', title: '書籍精煉', prompt: '請對 @[檔名]\n啟動【終極煉金管線】，一次執行四步驟整合：\n第一步：全域架構導航 (Stage 01)\n執行 stage-1-navigator，對精煉稿進行深度掃描，產出知識地圖與反直覺預警。\n存檔：01_Map_[主題簡稱].md。\n第二步：價值 DNA 診斷 (Stage 02)...' },
            { category: '筆記精煉', title: '書籍精煉 (2)', prompt: '空白測試資料（如圖左下角所示，僅有標題沒有內文）' },
            { category: '筆記精煉', title: '提取練習', prompt: '我剛讀完了關於 [填入具體段落標題] 的內容。現在請幫我進行深度研磨：\n\n1-底層邏輯拷問：針對這段內容的「運作原理」向我提問，測試我是否理解了「為什麼有效」，而非只是記住步驟。\n\n2-極端情境化：如果這段概念有極端...' },
            { category: '內容創作', title: '影片清理', prompt: '你的角色是一位「逐字稿校對員」，不是編輯。\n任務：\n1-僅刪除口語填充詞、重複說法、明顯冗詞\n2-不得改寫句型、不得改變原意、不得加入新解釋\n規則：\n1-原句順序必須完全一致\n2-若刪除任何詞語，需確保刪除前與後文連貫...' },
            { category: '內容創作', title: '影片清理 (進階)', prompt: '你的角色是一位「內容結構化整理員」，不是編輯、不是評論者。\n\n我會提供一段約 4000 字的影片文字內容，請你在完全保留原作者語意與立場的前提下，\n進行「保留語意的濃縮」，將內容壓縮至 約 2000 字。全文用繁體中文呈現。' },
            { category: '程式應用', title: '程式碼註解', prompt: '請幫我把這段 Python 程式碼加上詳細的中文註解，解釋每一行的邏輯與功能。' },
            { category: '專案企劃', title: '活動時程表', prompt: '幫我規劃一個為期三天的線上研討會活動時程表，包含開幕、三個主題演講、互動環節與閉幕。' }
        ];

        let allData = [];
        let currentCategory = '全部';
        let searchQuery = '';

        // DOM 元素
        const filterContainer = document.getElementById('filterContainer');
        const cardsGrid = document.getElementById('cardsGrid');
        const searchInput = document.getElementById('searchInput');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // 初始化應用程式
        async function init() {
            loadingIndicator.classList.remove('hidden');
            try {
                // 嘗試從 Google Sheet 獲取資料
                const response = await fetch(CSV_URL);
                const text = await response.text();
                
                // 清理 Google 回傳的 JSONP 格式字串
                const jsonString = text.match(/(?<=.*\().*(?=\);)/s)[0];
                const data = JSON.parse(jsonString);
                
                // 假設欄位對應：Col1(A)=分類, Col2(B)=標題, Col3(C)=內容
                // 如果實際表單結構不同，可以在這裡調整 data.table.rows 的解析方式
                allData = data.table.rows.map(row => ({
                    category: row.c[0] ? row.c[0].v : '未分類',
                    title: row.c[1] ? row.c[1].v : '無標題',
                    prompt: row.c[2] ? row.c[2].v : ''
                })).filter(item => item.title !== '無標題'); // 過濾掉空行
                
                if(allData.length === 0) throw new Error("無資料");

            } catch (error) {
                console.warn('無法從 Google Sheet 讀取資料，或格式不符，使用備用資料。', error);
                // 讀取失敗時使用備用資料
                allData = mockData;
            } finally {
                loadingIndicator.classList.add('hidden');
            }

            renderFilters();
            renderCards();
            setupSearch();
        }

        // 渲染篩選按鈕
        function renderFilters() {
            // 預設分類與從資料中提取的獨立分類
            const hardcodedCategories = ['全部', '內容創作', '筆記精煉', '程式應用', '簡報表達', '程式生成', '文本優化', '生文校正', '專案企劃', '圖片生成', '筆記整理', '資訊整理', '心智圖法'];
            
            // 如果 Sheet 裡面有新的分類，也加進去
            const dataCategories = [...new Set(allData.map(item => item.category))];
            const allCategories = [...new Set([...hardcodedCategories, ...dataCategories])];

            filterContainer.innerHTML = '';

            allCategories.forEach(category => {
                const btn = document.createElement('button');
                btn.innerText = category;
                // 設定預設與點擊狀態的樣式
                btn.className = `px-5 py-2 rounded-full text-sm font-medium transition-colors border outline-none ${
                    currentCategory === category 
                    ? 'bg-blue-500 text-white border-blue-500 shadow-md' 
                    : 'bg-white text-gray-600 border-gray-200 hover:border-blue-300 hover:text-blue-500'
                }`;
                
                btn.addEventListener('click', () => {
                    currentCategory = category;
                    renderFilters(); // 重新渲染更新 Active 狀態
                    renderCards();   // 重新渲染卡片
                });

                filterContainer.appendChild(btn);
            });
        }

        // 渲染卡片網格
        function renderCards() {
            cardsGrid.innerHTML = '';

            // 根據搜尋與分類過濾資料
            const filteredData = allData.filter(item => {
                const matchCategory = currentCategory === '全部' || item.category === currentCategory;
                const matchSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                    item.prompt.toLowerCase().includes(searchQuery.toLowerCase());
                return matchCategory && matchSearch;
            });

            if (filteredData.length === 0) {
                cardsGrid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500">找不到符合條件的 Prompt，試試其他關鍵字吧！</div>`;
                return;
            }

            filteredData.forEach((item, index) => {
                // 判斷分類標籤的顏色 (這裡簡單做個隨機或固定對應)
                let tagColorClass = 'bg-blue-50 text-blue-500';
                if (item.category.includes('筆記')) tagColorClass = 'bg-emerald-50 text-emerald-600';
                else if (item.category.includes('程式')) tagColorClass = 'bg-amber-50 text-amber-600';

                // 生成卡片 HTML
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border-t-4 border-purple-600 p-5 flex flex-col gap-3 h-[380px] hover:shadow-md transition-shadow";
                
                // 為了確保複製按鈕功能，將提示詞內容存在屬性中
                const escapedPrompt = item.prompt.replace(/"/g, '&quot;');

                card.innerHTML = `
                    <div class="flex items-start">
                        <span class="${tagColorClass} text-xs px-2.5 py-1 rounded-md font-medium">
                            ${item.category}
                        </span>
                    </div>
                    <h3 class="font-bold text-gray-900 text-lg">${item.title}</h3>
                    <div class="prompt-box bg-gray-50 text-gray-600 text-sm p-4 rounded-lg flex-grow overflow-y-auto leading-relaxed whitespace-pre-wrap border border-gray-100 shadow-inner">
                        ${item.prompt}
                    </div>
                    <button onclick="copyPrompt(this, \`${escapedPrompt}\`)" class="w-full bg-[#0070F0] hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2 mt-2">
                        <i class="fa-regular fa-copy"></i>
                        <span>複製 Prompt</span>
                    </button>
                `;
                cardsGrid.appendChild(card);
            });
        }

        // 搜尋功能綁定
        function setupSearch() {
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.trim();
                renderCards();
            });
        }

        // 複製 Prompt 內容至剪貼簿的功能
        function copyPrompt(btnElement, textToCopy) {
            if (!textToCopy) return;

            // 使用 Clipboard API
            navigator.clipboard.writeText(textToCopy).then(() => {
                // 備份原始按鈕內容
                const originalHtml = btnElement.innerHTML;
                const originalBg = btnElement.className;

                // 更改按鈕狀態為成功
                btnElement.innerHTML = `<i class="fa-solid fa-check"></i><span>複製成功!</span>`;
                btnElement.classList.replace('bg-[#0070F0]', 'bg-green-600');
                btnElement.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');

                // 2 秒後恢復原狀
                setTimeout(() => {
                    btnElement.innerHTML = originalHtml;
                    btnElement.classList.replace('bg-green-600', 'bg-[#0070F0]');
                    btnElement.classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
                }, 2000);
            }).catch(err => {
                console.error('複製失敗:', err);
                alert('複製失敗，請手動選取複製！');
            });
        }

        // 啟動程式
        init();

    </script>
</body>
</html>
