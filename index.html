<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <!-- 引入 Tailwind CSS 進行快速且現代的排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 作為 Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入 Noto Sans TC 提供優質的繁體中文閱讀體驗 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script>
        // 設定 Tailwind 的自訂顏色
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // 舒適閱讀的背景色 (暖淺灰)
                        'reading-bg': '#F5F5F7',
                        // 舒適閱讀的卡片底色
                        'reading-card': '#FFFFFF',
                        // 品牌主色 (按鈕、重點)
                        'brand-blue': '#0070F0',
                        'brand-blue-hover': '#005bb5',
                        // 卡片頂部紫色邊框
                        'card-top': '#8B5CF6'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F5F5F7; /* 舒適閱讀背景 */
        }
        
        /* 自訂卡片內部 Prompt 文字框的優雅捲軸 */
        .prompt-box::-webkit-scrollbar {
            width: 6px;
        }
        .prompt-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .prompt-box::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        .prompt-box::-webkit-scrollbar-thumb:hover {
            background-color: #94a3b8;
        }

        /* 隱藏全域預設捲軸，讓整體畫面更乾淨 (僅限 Webkit 瀏覽器) */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #F5F5F7;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }

        /* 確保卡片內的文字在多行時仍保持良好閱讀性 */
        .prompt-box {
            white-space: pre-wrap; 
            word-break: break-word;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen pb-16">

    <!-- 頂部 Header -->
    <header class="pt-16 pb-8 px-4 text-center max-w-7xl mx-auto">
        <h1 class="text-4xl font-bold mb-4 flex justify-center items-center gap-3 text-gray-800">
            🚀 AI Prompt 智能寶庫
        </h1>
        <a href="https://docs.google.com/spreadsheets/d/12bQtFvexxt1yfl_08fWLzH80-6vZowaGTq7FtwM9GAg/edit" target="_blank" class="text-gray-500 hover:text-gray-800 text-sm inline-flex items-center gap-2 transition-colors bg-white px-4 py-2 rounded-full shadow-sm border border-gray-200">
            <i class="fa-solid fa-file-excel text-green-600"></i> 開啟原始資料 Google Sheet
        </a>
    </header>

    <!-- 搜尋欄 -->
    <div class="max-w-3xl mx-auto px-4 mb-8">
        <div class="relative shadow-sm rounded-full bg-white border border-gray-200 hover:border-gray-300 transition-colors">
            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
            </div>
            <input type="text" id="searchInput" class="block w-full pl-12 pr-6 py-4 rounded-full border-0 text-gray-900 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-blue sm:text-lg sm:leading-6 outline-none bg-transparent transition-all" placeholder="搜尋想要的提示詞、場景或關鍵字...">
        </div>
    </div>

    <!-- 篩選標籤區 -->
    <div class="max-w-6xl mx-auto px-4 mb-12">
        <div id="filterContainer" class="flex flex-wrap justify-center gap-3">
            <!-- 標籤將由 JS 動態生成 -->
        </div>
    </div>

    <!-- 主要內容區 -->
    <main class="max-w-7xl mx-auto px-4">
        <!-- 區塊標題 -->
        <h2 class="text-2xl font-bold mb-8 flex items-center gap-2 text-gray-700 border-b border-gray-200 pb-3">
            🧠 AI 協思
        </h2>
        
        <!-- 載入中提示 -->
        <div id="loadingIndicator" class="text-center py-20 text-gray-500">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-brand-blue"></i>
            <p class="text-lg">正在從 Google Sheet 載入最新資料...</p>
        </div>

        <!-- 
            卡片網格 (Grid)
            設定為：手機 1 欄位 (grid-cols-1) -> 平板 2 欄位 (md:grid-cols-2) -> 電腦 3 欄位 (lg:grid-cols-3) 
            這滿足了您「一頁一排3個主題」且「卡片100%填滿網格」的需求
        -->
        <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden">
            <!-- 卡片將由 JS 動態生成 -->
        </div>
    </main>

    <script>
        // Google Sheet 的 ID (來源自您提供的網址)
        const SHEET_ID = '12bQtFvexxt1yfl_08fWLzH80-6vZowaGTq7FtwM9GAg';
        // Google Visualization API 端點 (可將公開的 Sheet 輸出為 JSON)
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        // 預設資料 (若 Google Sheet 權限未公開時的備用資料，確保畫面能正常顯示)
        const mockData = [
            { category: '內容創作', title: '提示詞模板', prompt: '將文章的重點部分，尋找一個代表性英文字母，並使這些字母的首字組合成一個具有意義的單詞（如「VISION」）。透過這種方式，讓複雜的概念更容易被記住與傳播。' },
            { category: '內容創作', title: '品牌名稱', prompt: '完成 ChatGPT 角色定義後，依據「品牌定義」與「產品介紹」發想5個產品名稱與標題（口號）。\n- 提示詞指令：描述品牌與產品，請列出 數字 個產品名稱與行銷標題建議。（*品牌定義*描述、*產品介紹*描述）\n- Prompt\n　　- 我推出一個運動鞋品牌，今年會銷售一款新型跑步鞋...' },
            { category: '筆記精煉', title: '長編文章', prompt: '為這一篇長篇文章，進行以下四個步驟，每一個步驟都提供給文章與標示出來\n第1、請為這篇長文件生成一份簡短摘要。\n第2、請基於上一個摘要，不要遺漏任何專有名詞、數字或關鍵人物，重新生成一份摘要。\n第3、現在，請將摘要中每一句話都濃縮成更簡潔的表達，同時保留原意...' },
            { category: '筆記精煉', title: '書籍精煉', prompt: '請對 @[檔名]\n啟動【終極煉金管線】，一次執行四步驟整合：\n第一步：全域架構導航 (Stage 01)\n執行 stage-1-navigator，對精煉稿進行深度掃描，產出知識地圖與反直覺預警。\n存檔：01_Map_[主題簡稱].md。\n第二步：價值 DNA 診斷 (Stage 02)...' },
            { category: '筆記精煉', title: '提取練習', prompt: '我剛讀完了關於 [填入具體段落標題] 的內容。現在請幫我進行深度研磨：\n\n1-底層邏輯拷問：針對這段內容的「運作原理」向我提問，測試我是否理解了「為什麼有效」，而非只是記住步驟。\n\n2-極端情境化：如果這段概念有極端應用，請舉例說明...' },
            { category: '內容創作', title: '影片清理', prompt: '你的角色是一位「逐字稿校對員」，不是編輯。\n任務：\n1-僅刪除口語填充詞、重複說法、明顯冗詞\n2-不得改寫句型、不得改變原意、不得加入新解釋\n規則：\n1-原句順序必須完全一致\n2-若刪除任何詞語，需確保刪除前與後文連貫...' }
        ];

        let allData = [];
        let currentCategory = '全部';
        let searchQuery = '';

        // DOM 元素
        const filterContainer = document.getElementById('filterContainer');
        const cardsGrid = document.getElementById('cardsGrid');
        const searchInput = document.getElementById('searchInput');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // 初始化應用程式
        async function init() {
            try {
                // 嘗試從 Google Sheet 獲取資料
                const response = await fetch(CSV_URL);
                const text = await response.text();
                
                // 清理 Google 回傳的 JSONP 格式字串，轉成純 JSON
                const jsonString = text.match(/(?<=.*\().*(?=\);)/s)[0];
                const data = JSON.parse(jsonString);
                
                // 處理資料：假設第一欄(A)是分類, 第二欄(B)是標題, 第三欄(C)是內容
                allData = data.table.rows.map(row => ({
                    category: (row.c && row.c[0] && row.c[0].v) ? String(row.c[0].v).trim() : '未分類',
                    title: (row.c && row.c[1] && row.c[1].v) ? String(row.c[1].v).trim() : '無標題',
                    prompt: (row.c && row.c[2] && row.c[2].v) ? String(row.c[2].v).trim() : ''
                })).filter(item => item.title !== '無標題' && item.prompt !== ''); // 過濾空資料

                if(allData.length === 0) throw new Error("讀取到的資料為空");

            } catch (error) {
                console.warn('無法從 Google Sheet 讀取，使用備用資料 (Mock Data)。', error);
                // 讀取失敗時使用預設的備用資料
                allData = mockData;
            } finally {
                // 隱藏載入中，顯示網格
                loadingIndicator.classList.add('hidden');
                cardsGrid.classList.remove('hidden');
            }

            renderFilters();
            renderCards();
            setupSearch();
        }

        // 渲染篩選按鈕
        function renderFilters() {
            // 從圖片中得知的預設分類
            const hardcodedCategories = ['全部', '內容創作', '筆記精煉', '程式應用', '簡報表達', '程式生成', '文本優化', '生文校正', '專案企劃', '圖片生成', '筆記整理', '資訊整理', '心智圖法'];
            
            // 加入資料庫中可能有的新分類，並去重
            const dataCategories = [...new Set(allData.map(item => item.category))];
            const allCategories = [...new Set([...hardcodedCategories, ...dataCategories])];

            filterContainer.innerHTML = '';

            allCategories.forEach(category => {
                const btn = document.createElement('button');
                btn.innerText = category;
                // 設定按鈕樣式 (依據是否被選取)
                btn.className = `px-6 py-2.5 rounded-full text-sm font-medium transition-all duration-200 outline-none ${
                    currentCategory === category 
                    ? 'bg-brand-blue text-white shadow-md transform scale-105' 
                    : 'bg-white text-gray-600 hover:bg-gray-100 hover:text-gray-900 border border-gray-200'
                }`;
                
                btn.addEventListener('click', () => {
                    currentCategory = category;
                    renderFilters(); // 更新按鈕視覺狀態
                    renderCards();   // 更新卡片內容
                });

                filterContainer.appendChild(btn);
            });
        }

        // 渲染卡片
        function renderCards() {
            cardsGrid.innerHTML = '';

            // 依據搜尋關鍵字與分類進行資料過濾
            const filteredData = allData.filter(item => {
                const matchCategory = currentCategory === '全部' || item.category === currentCategory;
                const matchSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                    item.prompt.toLowerCase().includes(searchQuery.toLowerCase());
                return matchCategory && matchSearch;
            });

            if (filteredData.length === 0) {
                cardsGrid.innerHTML = `
                    <div class="col-span-full text-center py-20 text-gray-500 bg-white rounded-2xl border border-gray-200">
                        <i class="fa-regular fa-face-frown text-4xl mb-4 text-gray-400"></i>
                        <p class="text-lg">找不到符合條件的 Prompt，試試其他關鍵字吧！</p>
                    </div>
                `;
                return;
            }

            filteredData.forEach(item => {
                // 為不同分類加上一點顏色小細節
                let tagColorClass = 'bg-blue-50 text-blue-600 border-blue-100';
                if (item.category.includes('筆記')) tagColorClass = 'bg-emerald-50 text-emerald-600 border-emerald-100';
                else if (item.category.includes('程式')) tagColorClass = 'bg-amber-50 text-amber-600 border-amber-100';

                const card = document.createElement('div');
                // 卡片主體樣式：高度固定，滿版寬度，頂部紫邊
                card.className = "bg-reading-card rounded-2xl shadow-sm border border-gray-100 border-t-[5px] border-t-card-top p-6 flex flex-col gap-4 h-[440px] hover:shadow-lg transition-shadow w-full relative";
                
                // 將特殊字元編碼，避免塞入 HTML 屬性時出錯
                const escapedPrompt = item.prompt
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;")
                    .replace(/\n/g, "\\n");

                card.innerHTML = `
                    <div class="flex items-start">
                        <span class="${tagColorClass} border text-xs px-3 py-1.5 rounded-lg font-bold tracking-wide">
                            ${item.category}
                        </span>
                    </div>
                    <h3 class="font-bold text-gray-900 text-xl tracking-tight">${item.title}</h3>
                    
                    <div class="prompt-box bg-[#F9FAFB] text-gray-600 text-[15px] p-5 rounded-xl flex-grow overflow-y-auto leading-loose border border-gray-100">
                        ${item.prompt}
                    </div>
                    
                    <button onclick="copyPrompt(this, \`${escapedPrompt}\`)" class="w-full bg-brand-blue hover:bg-brand-blue-hover text-white font-medium py-3.5 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 mt-2 shadow-sm hover:shadow active:scale-[0.98]">
                        <i class="fa-regular fa-copy"></i>
                        <span class="tracking-wide">複製 Prompt</span>
                    </button>
                `;
                cardsGrid.appendChild(card);
            });
        }

        // 搜尋輸入監聽
        function setupSearch() {
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.trim();
                renderCards();
            });
        }

        // 複製功能
        function copyPrompt(btnElement, textToCopy) {
            if (!textToCopy) return;

            // 把先前的 \\n 轉換回真實的換行符號
            const finalText = textToCopy.replace(/\\n/g, '\n');

            navigator.clipboard.writeText(finalText).then(() => {
                // 記錄原始按鈕狀態
                const originalHtml = btnElement.innerHTML;
                
                // 修改按鈕為成功狀態
                btnElement.innerHTML = `<i class="fa-solid fa-check"></i><span class="tracking-wide">複製成功!</span>`;
                btnElement.classList.replace('bg-brand-blue', 'bg-green-600');
                btnElement.classList.replace('hover:bg-brand-blue-hover', 'hover:bg-green-700');

                // 2 秒後恢復原狀
                setTimeout(() => {
                    btnElement.innerHTML = originalHtml;
                    btnElement.classList.replace('bg-green-600', 'bg-brand-blue');
                    btnElement.classList.replace('hover:bg-green-700', 'hover:bg-brand-blue-hover');
                }, 2000);
            }).catch(err => {
                console.error('複製失敗:', err);
                // iframe 環境下可能會被阻擋 clipboard，提供傳統 fallback
                fallbackCopyTextToClipboard(finalText, btnElement);
            });
        }

        // 傳統複製備案 (針對某些瀏覽器限制)
        function fallbackCopyTextToClipboard(text, btnElement) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                const successful = document.execCommand('copy');
                if(successful) {
                    const originalHtml = btnElement.innerHTML;
                    btnElement.innerHTML = `<i class="fa-solid fa-check"></i><span class="tracking-wide">複製成功!</span>`;
                    btnElement.classList.replace('bg-brand-blue', 'bg-green-600');
                    btnElement.classList.replace('hover:bg-brand-blue-hover', 'hover:bg-green-700');
                    setTimeout(() => {
                        btnElement.innerHTML = originalHtml;
                        btnElement.classList.replace('bg-green-600', 'bg-brand-blue');
                        btnElement.classList.replace('hover:bg-green-700', 'hover:bg-brand-blue-hover');
                    }, 2000);
                }
            } catch (err) {
                console.error('Fallback: 複製失敗', err);
            }
            document.body.removeChild(textArea);
        }

        // 啟動
        init();

    </script>
</body>
</html>
